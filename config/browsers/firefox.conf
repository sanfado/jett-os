# =============================================================================
# firefox.conf — Perfil técnico do Firefox para Jett OS
# =============================================================================
# Localização no projeto : config/browsers/firefox.conf
# Instalado em           : /etc/jett-os/firefox.conf
#
# Este arquivo contém apenas configurações técnicas de integração.
# Preferências de uso são responsabilidade do usuário.
#
# Arquitetura de configuração do Firefox:
#   O Firefox usa TRÊS mecanismos de configuração, cada um com escopo diferente:
#
#   1. Variáveis de ambiente (este arquivo, seção ENVIRONMENT)
#      Controlam o comportamento do processo antes do Firefox inicializar.
#      Exemplo: MOZ_ENABLE_WAYLAND — escolhe o backend de display.
#      Carregadas por: systemd EnvironmentFile=, wrapper jett-firefox-kiosk.
#
#   2. Flags de linha de comando (seção CLI_FLAGS)
#      Modificam o comportamento de inicialização.
#      Exemplo: --kiosk — modo tela cheia sem interface.
#      Usadas em: ExecStart do serviço systemd e wrapper.
#
#   3. Preferências de perfil do usuário — user.js (seção USERJS_PREFS)
#      Configurações internas do Firefox aplicadas ao perfil.
#      Exemplo: gfx.webrender.all — ativa aceleração WebRender via GPU.
#      Aplicadas por: install-firefox.sh ao criar o perfil kiosk em
#      /home/jett/.mozilla/firefox/jett-kiosk/user.js
#
# O que está FORA do escopo deste arquivo (escolha do usuário):
#   - Enhanced Tracking Protection (nível Padrão, Estrito, Personalizado)
#   - Firefox Sync (conta Firefox)
#   - DNS over HTTPS (escolha de privacidade/rede)
#   - Configurações de cookies e permissões de sites
#   - Tema visual do Firefox
#   - Extensões (uBlock, etc.)
#   - about:config entries além das necessárias para aceleração Wayland
#
# O que está DENTRO do escopo (integração técnica com o Jett OS):
#   - MOZ_ENABLE_WAYLAND: backend Wayland nativo (requisito do sistema)
#   - MOZ_USE_XINPUT2: protocolo de input para Wayland
#   - gfx.webrender.all: aceleração GPU via WebRender (renderização)
#   - gfx.webrender.compositor: compositor WebRender nativo no Wayland
#   - Desabilitação de crash reporter (sem diálogos em kiosk headless)
#
# Uso pelos scripts:
#   source config/browsers/firefox.conf
#   # Variáveis de ambiente são exportadas pelo wrapper jett-firefox-kiosk
#   # Prefs user.js são aplicadas pelo install-firefox.sh ao perfil kiosk
# =============================================================================

# =============================================================================
# SEÇÃO 1: VARIÁVEIS DE AMBIENTE
# Exportadas antes da inicialização do Firefox.
# Carregadas via: EnvironmentFile= no systemd, ou 'source' no wrapper.
# =============================================================================

# MOZ_ENABLE_WAYLAND=1
#   Força o Firefox a usar o backend Wayland nativo em vez de XWayland.
#
#   Por que é necessário mesmo com $WAYLAND_DISPLAY definido:
#   O Firefox detecta presença de $DISPLAY (variável do X11) além de
#   $WAYLAND_DISPLAY. O Sway do Jett OS habilita XWayland para o
#   jett-launcher.py, o que resulta em $DISPLAY=:0 disponível.
#   Sem MOZ_ENABLE_WAYLAND=1, o Firefox pode escolher XWayland mesmo
#   quando Wayland nativo está disponível — perdendo integração de
#   gestos, HDR (em hardware suportado) e eficiência de composição.
MOZ_ENABLE_WAYLAND=1

# MOZ_USE_XINPUT2=1
#   Ativa o protocolo XInput2 para tratamento de eventos de input no Wayland.
#   Melhora o suporte a touchscreen, stylus e gestos de multitouch.
#   Em hardware sem touchscreen é inócuo; com touchscreen é necessário
#   para funcionamento correto no Wayland.
MOZ_USE_XINPUT2=1

# MOZ_CRASHREPORTER_DISABLE=1
#   Desativa o crash reporter do Firefox.
#
#   Por que é uma configuração técnica, não de preferência:
#   Em um ambiente kiosk headless (sem sessão de usuário), o crash reporter
#   tenta exibir uma janela de diálogo pedindo permissão para enviar o
#   relatório de crash. Sem um usuário presente para clicar em "Enviar" ou
#   "Cancelar", essa janela fica bloqueando indefinidamente, impedindo
#   que o systemd reinicie o Firefox via Restart=always.
#   O crash reporter é irrelevante em kiosk pois não há usuário para
#   receber ou agir sobre os relatórios.
MOZ_CRASHREPORTER_DISABLE=1

# =============================================================================
# SEÇÃO 2: FLAGS DE LINHA DE COMANDO
# Passadas ao binário firefox ao inicializar.
# Usadas no ExecStart do serviço e no wrapper jett-firefox-kiosk.
# =============================================================================

# --kiosk
#   Único argumento CLI necessário para o modo kiosk no Firefox.
#   Remove a barra de endereços, barra de ferramentas, menus e abas.
#   O Firefox não tem equivalentes de --disable-infobars ou
#   --no-default-browser-check via CLI — essas são controladas via
#   preferências de perfil (user.js, seção abaixo).

JETT_FIREFOX_FLAGS=(
    "--kiosk"
)

JETT_FIREFOX_FLAGS_STR="${JETT_FIREFOX_FLAGS[*]}"

# =============================================================================
# SEÇÃO 3: PREFERÊNCIAS DE PERFIL (user.js)
# Aplicadas ao perfil kiosk em ~/.mozilla/firefox/jett-kiosk/user.js
# pelo script install-firefox.sh durante a instalação.
#
# Formato: user_pref("chave", valor);
# Documentado aqui como variáveis shell para uso pelo install-firefox.sh.
# =============================================================================

# gfx.webrender.all=true
#   Ativa o renderizador WebRender do Firefox em todos os contextos,
#   incluindo composição de janela e renderização de conteúdo web.
#
#   WebRender é o sistema de renderização via GPU do Firefox (baseado em
#   WebRender da Mozilla/Servo). Em vez de rasterizar o conteúdo na CPU
#   e enviar para a GPU, o WebRender envia a "cena" inteira para a GPU
#   e usa shaders para renderizar tudo em paralelo.
#
#   Por que é uma configuração técnica de integração:
#   No Wayland com drivers Mesa modernos (Intel ANV / AMD RADV), o WebRender
#   usa o Vulkan ou OpenGL ES para renderização direta — a GPU processa o
#   conteúdo sem passar pela CPU. Isso é especialmente relevante para:
#   - Animações e transições CSS (roda inteiramente na GPU)
#   - Rolagem de páginas (zero cópia de memória entre CPU e GPU)
#   - Vídeo WebGL e canvas 2D acelerado
#   A flag habilita uma integração de hardware que o Firefox, por
#   compatibilidade com hardware antigo, não ativa por padrão.
#
#   Pré-requisito: requer driver Mesa com suporte a OpenGL ES 3.0+.
#   Intel Gen 7+ (Ivy Bridge 2012+), AMD GCN (2012+), qualquer GPU com
#   drivers Mesa atualizados satisfazem esse requisito.
JETT_FIREFOX_PREF_WEBRENDER='user_pref("gfx.webrender.all", true);'

# gfx.webrender.compositor=true
#   Ativa o compositor nativo do WebRender para o Wayland.
#   Diferente do gfx.webrender.all (que cobre renderização de conteúdo),
#   esta preferência ativa o caminho de composição final onde os layers
#   da página são compostos via GPU antes de serem enviados ao compositor
#   Wayland (Sway). Reduz uma etapa de cópia entre o Firefox e o Sway.
JETT_FIREFOX_PREF_WEBRENDER_COMPOSITOR='user_pref("gfx.webrender.compositor", true);'

# browser.tabs.remote.autostart=true
#   Garante que o processo de conteúdo (content process) rode separado
#   do processo de interface (UI process) — multiprocessamento e10s.
#   É o padrão do Firefox moderno, mas explicitá-lo garante que não foi
#   desabilitado por alguma extensão ou configuração anterior no perfil.
#   Isolamento de processo é parte da arquitetura de segurança do Firefox.
JETT_FIREFOX_PREF_E10S='user_pref("browser.tabs.remote.autostart", true);'

# browser.startup.homepage_override.mstone=ignore
#   Suprime a página "O Firefox foi atualizado" que aparece após updates.
#   Em kiosk, essa página sobrepõe o conteúdo configurado e não pode ser
#   fechada sem interação do usuário. É um comportamento técnico de boot,
#   não uma preferência de uso.
JETT_FIREFOX_PREF_SKIP_UPDATE_PAGE='user_pref("browser.startup.homepage_override.mstone", "ignore");'

# toolkit.cosmeticAnimations.enabled=false
#   Desativa animações cosméticas internas do Firefox (abertura de tabs,
#   animação do loader de página, etc.). Reduz overhead de CPU/GPU para
#   animações que o usuário kiosk nunca verá (a interface está oculta
#   em modo --kiosk). Configuração de performance, não de preferência.
JETT_FIREFOX_PREF_NO_ANIMATIONS='user_pref("toolkit.cosmeticAnimations.enabled", false);'

# =============================================================================
# CONTEÚDO DO user.js GERADO (para uso pelo install-firefox.sh)
# Este bloco é a concatenação das prefs acima em formato user.js válido.
# O install-firefox.sh lê JETT_FIREFOX_USERJS e escreve em:
#   /home/jett/.mozilla/firefox/jett-kiosk/user.js
# =============================================================================
JETT_FIREFOX_USERJS="/* user.js do Jett OS — gerado por install-firefox.sh */
/* Este arquivo contém apenas configurações técnicas de integração. */
/* Preferências de uso são responsabilidade do usuário.              */

/* WebRender: aceleração de renderização via GPU no Wayland */
${JETT_FIREFOX_PREF_WEBRENDER}
${JETT_FIREFOX_PREF_WEBRENDER_COMPOSITOR}

/* Arquitetura de processos: e10s multiprocessamento */
${JETT_FIREFOX_PREF_E10S}

/* Comportamento de boot em kiosk: sem página de update */
${JETT_FIREFOX_PREF_SKIP_UPDATE_PAGE}

/* Performance: sem animações de interface (invisíveis em --kiosk) */
${JETT_FIREFOX_PREF_NO_ANIMATIONS}
"
