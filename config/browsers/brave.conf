# =============================================================================
# brave.conf — Perfil técnico do Brave Browser para Jett OS
# =============================================================================
# Localização no projeto : config/browsers/brave.conf
# Instalado em           : /etc/jett-os/brave.conf
#
# Este arquivo contém apenas configurações técnicas de integração.
# Preferências de uso são responsabilidade do usuário.
#
# O que está FORA do escopo deste arquivo (escolha do usuário):
#   - Brave Shields (nível de bloqueio de trackers e anúncios)
#   - Brave Rewards (BAT, ativação ou desativação de recompensas)
#   - Brave News (feed de notícias)
#   - Brave Wallet (configurações de carteira cripto)
#   - Configurações de privacidade além do mínimo técnico para kiosk
#   - Extensões e temas
#
# O que está DENTRO do escopo (integração técnica com o Jett OS):
#   - Modo kiosk (sem interface de navegador exposta)
#   - Backend Wayland nativo (requisito do sistema)
#   - Aceleração de hardware via VA-API (otimização de vídeo no hardware alvo)
#   - Estabilidade da sessão kiosk (sem diálogos que bloqueiam a tela)
#   - Integração com keyring do sistema (necessário para funcionar sem sessão desktop)
#
# Uso pelos scripts:
#   source config/browsers/brave.conf
#   /usr/bin/cage -- /usr/bin/brave-browser "${JETT_BRAVE_FLAGS[@]}"
# =============================================================================

# -----------------------------------------------------------------------------
# MODO KIOSK — interface do navegador completamente suprimida
# -----------------------------------------------------------------------------

# --kiosk
#   Ativa o modo kiosk do Chromium: tela cheia forçada, sem barra de
#   endereços, sem abas, sem controles de janela. Requisito fundamental
#   do Jett OS para o comportamento "o sistema é o navegador".
#
# --no-first-run
#   Suprime o wizard de configuração inicial do Brave (importar senhas,
#   escolher mecanismo de busca, configurar Rewards). Em um kiosk, esse
#   wizard bloquearia a tela indefinidamente na primeira inicialização.

JETT_BRAVE_FLAGS_KIOSK=(
    "--kiosk"
    "--no-first-run"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO WAYLAND — backend nativo sem XWayland
# -----------------------------------------------------------------------------

# --ozone-platform=wayland
#   Força o Brave (Chromium) a usar o backend Ozone/Wayland em vez de
#   detectar automaticamente. Sem esta flag, o Brave pode escolher XWayland
#   quando $DISPLAY está disponível (caso do Sway com XWayland habilitado
#   para o jett-launcher.py). Backend Wayland nativo tem menor latência,
#   melhor integração com gestos, e não passa pelo servidor X intermediário.
#
# --use-gl=egl
#   Instrui o Chromium a usar EGL para renderização OpenGL. EGL é a interface
#   nativa do Wayland com a GPU; GLX (a alternativa) é específico do X11.
#   Necessário para renderização correta no Wayland sem XWayland.
#
# --disable-features=UseChromeOSDirectVideoDecoder
#   No Linux, o Chromium às vezes tenta o decoder ChromeOS que não existe.
#   Desabilitar previne fallback silencioso para decodificação por software.

JETT_BRAVE_FLAGS_WAYLAND=(
    "--ozone-platform=wayland"
    "--use-gl=egl"
    "--disable-features=UseChromeOSDirectVideoDecoder"
)

# -----------------------------------------------------------------------------
# ACELERAÇÃO DE HARDWARE — VA-API para decodificação de vídeo
# -----------------------------------------------------------------------------

# --enable-features=VaapiVideoDecoder
#   Ativa a decodificação de vídeo por hardware via VA-API (Video Acceleration
#   API). Em hardware Intel/AMD, reduz drasticamente o uso de CPU ao reproduzir
#   vídeo (ex: de 80% para 5% em H.264 1080p). Crítico para kiosks de streaming
#   ou exibição de conteúdo em vídeo. Requer libva instalada no sistema.
#
# --enable-features=VaapiVideoEncoder
#   Ativa a codificação de vídeo por hardware. Relevante para kiosks com
#   WebRTC (videoconferência, captura de tela). Inócuo se não for usado.

JETT_BRAVE_FLAGS_HARDWARE=(
    "--enable-features=VaapiVideoDecoder,VaapiVideoEncoder"
)

# -----------------------------------------------------------------------------
# ESTABILIDADE DO KIOSK — sem diálogos que bloqueiam a tela
# -----------------------------------------------------------------------------

# --disable-session-crashed-bubble
#   Suprime o balão "O Brave encerrou inesperadamente — Restaurar abas?"
#   Em um kiosk, esse popup bloquearia a tela aguardando clique do usuário.
#   O Jett OS reinicia o navegador via Restart=always no systemd.
#
# --autoplay-policy=no-user-gesture-required
#   Permite que vídeos e áudios toquem automaticamente sem interação do
#   usuário. Necessário para kiosks de sinalização digital, dashboards e
#   conteúdo multimídia que devem iniciar sem clique.
#
# --disable-infobars
#   Remove barras de notificação do Chromium (ex: "O Brave não é seu
#   navegador padrão", "Traduzir esta página?"). Em kiosk, essas barras
#   reduzem a área útil e ficam permanentemente visíveis.
#
# --no-default-browser-check
#   Suprime a verificação e o popup "Definir como navegador padrão?"
#   Em kiosk há um único navegador ativo; a pergunta é irrelevante e
#   bloquearia a interface.

JETT_BRAVE_FLAGS_KIOSK_STABILITY=(
    "--disable-session-crashed-bubble"
    "--autoplay-policy=no-user-gesture-required"
    "--disable-infobars"
    "--no-default-browser-check"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO COM O SISTEMA — sem dependências de desktop environment
# -----------------------------------------------------------------------------

# --password-store=basic
#   Instrui o Chromium a usar armazenamento de senhas em texto simples
#   (criptografado com chave local) em vez de tentar abrir o GNOME Keyring
#   ou KWallet. No Jett OS não há desktop environment; sem esta flag,
#   o Brave tentaria abrir o keyring e travaria aguardando um daemon
#   que não existe (gnome-keyring-daemon, kwallet).
#
# --disable-background-mode
#   Impede o Brave de continuar rodando em background após "fechar".
#   Em kiosk não há tray icon nem botão "fechar"; esta flag garante que
#   o processo encerra completamente quando o systemd envia SIGTERM.

JETT_BRAVE_FLAGS_SYSTEM=(
    "--password-store=basic"
    "--disable-background-mode"
)

# -----------------------------------------------------------------------------
# VARIÁVEL CONSOLIDADA — todas as flags técnicas combinadas
# -----------------------------------------------------------------------------
# Usada pelos scripts de instalação e pelo systemd ExecStart:
#   brave-browser "${JETT_BRAVE_FLAGS[@]}"

JETT_BRAVE_FLAGS=(
    "${JETT_BRAVE_FLAGS_KIOSK[@]}"
    "${JETT_BRAVE_FLAGS_WAYLAND[@]}"
    "${JETT_BRAVE_FLAGS_HARDWARE[@]}"
    "${JETT_BRAVE_FLAGS_KIOSK_STABILITY[@]}"
    "${JETT_BRAVE_FLAGS_SYSTEM[@]}"
)

# String para uso em contextos que não suportam arrays (EnvironmentFile, logs):
JETT_BRAVE_FLAGS_STR="${JETT_BRAVE_FLAGS[*]}"
