# =============================================================================
# edge.conf — Perfil técnico do Microsoft Edge para Jett OS
# =============================================================================
# Localização no projeto : config/browsers/edge.conf
# Instalado em           : /etc/jett-os/edge.conf
#
# Este arquivo contém apenas configurações técnicas de integração.
# Preferências de uso são responsabilidade do usuário.
#
# O que está FORA do escopo deste arquivo (escolha do usuário):
#   - Microsoft Shopping Assistant (sugestões de preço e compra)
#   - Edge Insights / Sidebar (painéis de IA e ferramentas laterais)
#   - Sincronização de conta Microsoft (perfis, favoritos, histórico)
#   - Collections e outras funcionalidades de organização de conteúdo
#   - Configurações de privacidade além do mínimo técnico
#   - Seguimento de prevenção (modo Básico, Equilibrado, Estrito — escolha do usuário)
#
# O que está DENTRO do escopo (integração técnica com o Jett OS):
#   - Modo kiosk (sem interface de navegador exposta)
#   - Backend Wayland nativo (requisito do sistema)
#   - Aceleração de hardware via VA-API (otimização de vídeo no hardware alvo)
#   - Clarity Boost (--ms-clarity-boost): flag técnica de qualidade de streaming
#     que melhora a nitidez visual em transmissões Xbox Cloud Gaming e outros
#     serviços de streaming — integração de hardware/renderização, não preferência
#   - Desabilitação de recursos de IA/compras que interferem com a interface kiosk
#   - Estabilidade da sessão kiosk (sem diálogos que bloqueiam a tela)
#
# Uso pelos scripts:
#   source config/browsers/edge.conf
#   /usr/bin/cage -- /usr/bin/microsoft-edge-stable "${JETT_EDGE_FLAGS[@]}"
# =============================================================================

# -----------------------------------------------------------------------------
# MODO KIOSK — interface do navegador completamente suprimida
# -----------------------------------------------------------------------------

# --kiosk
#   Ativa o modo kiosk do Chromium/Edge: tela cheia forçada, sem barra de
#   endereços, sem abas, sem controles de janela.
#
# --no-first-run
#   Suprime o wizard de boas-vindas do Edge (configurar conta Microsoft,
#   escolher tema, importar dados do Chrome). Em kiosk bloquearia a tela
#   na primeira inicialização.

JETT_EDGE_FLAGS_KIOSK=(
    "--kiosk"
    "--no-first-run"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO WAYLAND — backend nativo sem XWayland
# -----------------------------------------------------------------------------

# --ozone-platform=wayland
#   Força o Edge (baseado em Chromium) a usar o backend Ozone/Wayland.
#   Sem esta flag, o Edge pode escolher XWayland quando $DISPLAY existe
#   (o Sway do Jett OS habilita XWayland para o jett-launcher.py).
#
# --use-gl=egl
#   Usa EGL para renderização OpenGL — interface nativa Wayland/GPU.
#   Alternativa GLX é específica do X11 e não adequada para Wayland nativo.
#
# --disable-features=UseChromeOSDirectVideoDecoder
#   Previne tentativa do Edge de usar decoder ChromeOS que não existe no Linux.

JETT_EDGE_FLAGS_WAYLAND=(
    "--ozone-platform=wayland"
    "--use-gl=egl"
    "--disable-features=UseChromeOSDirectVideoDecoder"
)

# -----------------------------------------------------------------------------
# CLARITY BOOST — qualidade técnica de streaming
# -----------------------------------------------------------------------------

# --ms-clarity-boost
#   Flag técnica do Microsoft Edge que ativa o Clarity Boost: processamento
#   de imagem para aumentar a nitidez visual em streams de vídeo, desenvolvido
#   especificamente para Xbox Cloud Gaming (xCloud) e outros serviços de
#   game streaming via browser.
#
#   Mecanismo: o Edge aplica um filtro de sharpening/upscaling via GPU
#   (usando as capacidades de processamento de imagem do hardware gráfico)
#   sobre o conteúdo de vídeo renderizado, melhorando a percepção de qualidade
#   sem aumentar a resolução do stream. É uma operação de renderização, não
#   uma preferência de uso.
#
#   Contexto de uso no Jett OS: kiosks de cloud gaming ou exibição de vídeo
#   onde a qualidade visual percebida é parte do requisito técnico do sistema.
#   Se o hardware não suportar (GPUs muito antigas), a flag é ignorada
#   silenciosamente pelo Edge — não causa erros.
#
#   Referência: Microsoft Edge Flags → edge://flags/#edge-clarity-boost

JETT_EDGE_FLAGS_CLARITY=(
    "--ms-clarity-boost"
)

# -----------------------------------------------------------------------------
# ACELERAÇÃO DE HARDWARE — VA-API para decodificação de vídeo
# -----------------------------------------------------------------------------

# --enable-features=VaapiVideoDecoder,VaapiVideoEncoder
#   Ativa decodificação e codificação de vídeo por hardware via VA-API.
#   Em hardware Intel/AMD, reduz uso de CPU em streams de vídeo.
#   Especialmente relevante em combinação com Clarity Boost (acima).

JETT_EDGE_FLAGS_HARDWARE=(
    "--enable-features=VaapiVideoDecoder,VaapiVideoEncoder"
)

# -----------------------------------------------------------------------------
# REMOÇÃO DE RECURSOS QUE INTERFEREM COM A INTERFACE KIOSK
# -----------------------------------------------------------------------------

# --disable-features=msEdgeShoppingAssistant
#   Desabilita o assistente de compras do Edge que sobrepõe a interface
#   com banners e popups de comparação de preços. Em kiosk, qualquer overlay
#   não solicitado compromete a experiência e pode cobrir conteúdo crítico.
#   Esta é uma decisão técnica de integridade da interface, não de privacidade.
#
# --disable-features=msEdgeInsights
#   Desabilita os "Insights" do Edge (painel lateral com resumos de IA,
#   sugestões de leitura). O painel lateral pode ser ativado por tecla de
#   atalho (Ctrl+Shift+/) e sobrepor a interface kiosk. Desabilitar previne
#   que qualquer interação acidental ou scripted abra o painel.
#
# --disable-features=msEdgeShopping
#   Complementar ao ShoppingAssistant — desabilita o módulo de compras
#   que pode injetar botões e overlays em páginas de e-commerce.

JETT_EDGE_FLAGS_INTERFACE=(
    "--disable-features=msEdgeShoppingAssistant,msEdgeInsights,msEdgeShopping"
)

# -----------------------------------------------------------------------------
# ESTABILIDADE DO KIOSK — sem diálogos que bloqueiam a tela
# -----------------------------------------------------------------------------

# Mesma filosofia do brave.conf: sem popups, sem perguntas, sem infobars.
# Ver brave.conf para justificativas detalhadas de cada flag.

JETT_EDGE_FLAGS_KIOSK_STABILITY=(
    "--disable-session-crashed-bubble"
    "--autoplay-policy=no-user-gesture-required"
    "--disable-infobars"
    "--no-default-browser-check"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO COM O SISTEMA
# -----------------------------------------------------------------------------

JETT_EDGE_FLAGS_SYSTEM=(
    "--password-store=basic"
    "--disable-background-mode"
    "--disable-sync"
)

# -----------------------------------------------------------------------------
# VARIÁVEL CONSOLIDADA
# -----------------------------------------------------------------------------

JETT_EDGE_FLAGS=(
    "${JETT_EDGE_FLAGS_KIOSK[@]}"
    "${JETT_EDGE_FLAGS_WAYLAND[@]}"
    "${JETT_EDGE_FLAGS_CLARITY[@]}"
    "${JETT_EDGE_FLAGS_HARDWARE[@]}"
    "${JETT_EDGE_FLAGS_INTERFACE[@]}"
    "${JETT_EDGE_FLAGS_KIOSK_STABILITY[@]}"
    "${JETT_EDGE_FLAGS_SYSTEM[@]}"
)

JETT_EDGE_FLAGS_STR="${JETT_EDGE_FLAGS[*]}"
