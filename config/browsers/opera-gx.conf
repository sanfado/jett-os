# =============================================================================
# opera-gx.conf — Perfil técnico do Opera GX para Jett OS
# =============================================================================
# Localização no projeto : config/browsers/opera-gx.conf
# Instalado em           : /etc/jett-os/opera.conf
#
# Este arquivo contém apenas configurações técnicas de integração.
# Preferências de uso são responsabilidade do usuário.
#
# O que está FORA do escopo deste arquivo (escolha do usuário):
#   - GX Corner (feed de notícias de jogos — ativado pelo usuário via painel GX)
#   - Network Limiter (limitador de banda por aplicação — escolha do usuário)
#   - RAM Limiter (limite de uso de RAM — escolha do usuário, depende do hardware)
#   - CPU Limiter (limite de uso de CPU — escolha do usuário, depende da carga)
#   - Opera GX Color Themes (temas visuais — estético, não técnico)
#   - Integração com Discord, Twitch, Spotify (ativadas pelo usuário no painel GX)
#   - VPN gratuita do Opera (escolha de privacidade do usuário)
#   - Bloqueador de anúncios nativo (escolha de privacidade do usuário)
#
# NOTA SOBRE LIMITADORES DE RAM E CPU:
#   Os limitadores GX são funcionalidades de uso altamente contextual:
#   o valor adequado depende do hardware específico da instalação e do
#   uso previsto do kiosk. Defini-los aqui forçaria uma configuração
#   potencialmente inadequada para o hardware do usuário. O administrador
#   do sistema deve configurá-los via opera://settings/gx após instalação.
#
# O que está DENTRO do escopo (integração técnica com o Jett OS):
#   - Modo kiosk (sem interface de navegador exposta)
#   - Backend Wayland nativo (requisito do sistema)
#   - Aceleração de hardware via VA-API
#   - Estabilidade da sessão kiosk
#
# Uso pelos scripts:
#   source config/browsers/opera-gx.conf
#   /usr/bin/cage -- /usr/bin/opera "${JETT_OPERA_FLAGS[@]}"
# =============================================================================

# -----------------------------------------------------------------------------
# MODO KIOSK — interface do navegador completamente suprimida
# -----------------------------------------------------------------------------

# --kiosk
#   Modo kiosk do Opera (herdado do Chromium): tela cheia sem interface.
#
# --no-first-run
#   Suprime o wizard de boas-vindas do Opera GX (tema, conta Opera,
#   configuração do GX Corner). Em kiosk, bloquearia a tela na primeira
#   inicialização aguardando input do usuário.

JETT_OPERA_FLAGS_KIOSK=(
    "--kiosk"
    "--no-first-run"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO WAYLAND — backend nativo sem XWayland
# -----------------------------------------------------------------------------

# --ozone-platform=wayland
#   Opera é baseado em Chromium/Blink e usa o mesmo sistema Ozone para
#   backends de display. Força o backend Wayland nativo.
#
# --use-gl=egl
#   EGL para renderização OpenGL — necessário para Wayland nativo.
#
# --disable-features=UseChromeOSDirectVideoDecoder
#   Previne tentativa de usar decoder ChromeOS inexistente no Linux.

JETT_OPERA_FLAGS_WAYLAND=(
    "--ozone-platform=wayland"
    "--use-gl=egl"
    "--disable-features=UseChromeOSDirectVideoDecoder"
)

# -----------------------------------------------------------------------------
# ACELERAÇÃO DE HARDWARE — VA-API para decodificação de vídeo
# -----------------------------------------------------------------------------

# --enable-features=VaapiVideoDecoder,VaapiVideoEncoder
#   VA-API para decodificação/codificação de vídeo por hardware.
#   Especialmente relevante para kiosks Opera GX usados em cloud gaming,
#   onde o vídeo é o componente principal da experiência.

JETT_OPERA_FLAGS_HARDWARE=(
    "--enable-features=VaapiVideoDecoder,VaapiVideoEncoder"
)

# -----------------------------------------------------------------------------
# ESTABILIDADE DO KIOSK — sem diálogos que bloqueiam a tela
# -----------------------------------------------------------------------------

# --disable-session-crashed-bubble
#   Sem popup de "sessão encerrada inesperadamente". O systemd reinicia
#   o Opera via Restart=always; o popup é redundante e bloqueia a tela.
#
# --autoplay-policy=no-user-gesture-required
#   Autoplay de mídia sem gesto do usuário. Opera GX é frequentemente
#   usado para streaming de jogos — o autoplay de vídeo é esperado.
#
# --disable-infobars
#   Remove barras de notificação do Opera (ex: notificações do sistema,
#   sugestões de extensões, mensagens de atualização que sobrepõem conteúdo).
#
# --no-default-browser-check
#   Sem pergunta "Definir Opera como padrão?". Em kiosk há um único
#   navegador ativo e a pergunta é irrelevante.

JETT_OPERA_FLAGS_KIOSK_STABILITY=(
    "--disable-session-crashed-bubble"
    "--autoplay-policy=no-user-gesture-required"
    "--disable-infobars"
    "--no-default-browser-check"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO COM O SISTEMA
# -----------------------------------------------------------------------------

# --password-store=basic
#   Sem dependência de GNOME Keyring ou KWallet — não existem no Jett OS.
#
# --disable-background-mode
#   Processo encerra completamente com SIGTERM do systemd.
#
# --disable-sync
#   Sem sincronização com conta Opera. Em kiosk não há conta de usuário.

JETT_OPERA_FLAGS_SYSTEM=(
    "--password-store=basic"
    "--disable-background-mode"
    "--disable-sync"
)

# -----------------------------------------------------------------------------
# VARIÁVEL CONSOLIDADA
# -----------------------------------------------------------------------------

JETT_OPERA_FLAGS=(
    "${JETT_OPERA_FLAGS_KIOSK[@]}"
    "${JETT_OPERA_FLAGS_WAYLAND[@]}"
    "${JETT_OPERA_FLAGS_HARDWARE[@]}"
    "${JETT_OPERA_FLAGS_KIOSK_STABILITY[@]}"
    "${JETT_OPERA_FLAGS_SYSTEM[@]}"
)

JETT_OPERA_FLAGS_STR="${JETT_OPERA_FLAGS[*]}"
