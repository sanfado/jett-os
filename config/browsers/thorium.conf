# =============================================================================
# thorium.conf — Perfil técnico do Thorium Browser para Jett OS
# =============================================================================
# Localização no projeto : config/browsers/thorium.conf
# Instalado em           : /etc/jett-os/thorium.conf
#
# Este arquivo contém apenas configurações técnicas de integração.
# Preferências de uso são responsabilidade do usuário.
#
# Contexto técnico do Thorium:
#   O Thorium é um fork do Chromium compilado com otimizações de compilador
#   para x86_64 (SSE4, AVX ou AVX2 dependendo da variante instalada).
#   Em runtime, o Thorium expõe flags de GPU e renderização que os builds
#   padrão do Chromium desabilitam por precaução de compatibilidade.
#   No Jett OS, o hardware alvo é conhecido e controlado — podemos
#   habilitar essas otimizações com segurança.
#
# O que está FORA do escopo deste arquivo (escolha do usuário):
#   - Mecanismo de busca padrão
#   - Configurações de privacidade e telemetria
#   - Extensões e perfis de usuário
#   - Configurações de codec (além das flags de aceleração de hardware)
#
# O que está DENTRO do escopo (integração técnica com o Jett OS):
#   - Modo kiosk
#   - Backend Wayland nativo
#   - Flags de aceleração GPU que o Thorium suporta mas o Chromium vanilla
#     desabilita por cautela (gpu-rasterization, zero-copy, ignore-gpu-blocklist)
#   - VA-API para decodificação de vídeo por hardware
#
# Uso pelos scripts:
#   source config/browsers/thorium.conf
#   /usr/bin/cage -- /usr/bin/thorium-browser "${JETT_THORIUM_FLAGS[@]}"
# =============================================================================

# -----------------------------------------------------------------------------
# MODO KIOSK
# -----------------------------------------------------------------------------

JETT_THORIUM_FLAGS_KIOSK=(
    "--kiosk"
    "--no-first-run"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO WAYLAND
# -----------------------------------------------------------------------------

JETT_THORIUM_FLAGS_WAYLAND=(
    "--ozone-platform=wayland"
    "--use-gl=egl"
    "--disable-features=UseChromeOSDirectVideoDecoder"
)

# -----------------------------------------------------------------------------
# ACELERAÇÃO DE HARDWARE VIA GPU — flags específicas do Thorium
# -----------------------------------------------------------------------------

# --enable-gpu-rasterization
#   Transfere a rasterização do conteúdo HTML/CSS para a GPU em vez da CPU.
#   No Chromium vanilla, esta flag é controlada por uma blocklist de drivers
#   problemáticos. O Thorium a expõe e, no Jett OS, o hardware é validado
#   durante o build do sistema — podemos habilitá-la incondicionalmente.
#
#   Impacto mensurável: páginas com animações CSS pesadas, canvas 2D e
#   conteúdo dinâmico reduzem uso de CPU em 20-40% em hardware Intel/AMD
#   com drivers Mesa atualizados.
#
# --enable-zero-copy
#   Permite que o Chromium passe texturas de vídeo diretamente para o
#   compositor Wayland (Sway) sem copiar os dados entre buffers de memória.
#   Zero-copy elimina uma cópia de memória por frame de vídeo, reduzindo
#   latência e uso de memória em streams de vídeo.
#
#   Pré-requisito: requer suporte a dmabuf no kernel e driver gráfico.
#   No Debian Bookworm+ com kernel 6.x e Mesa 23+, é garantido em
#   hardware Intel Gen 8+ (Broadwell 2014+) e AMD GCN 1.2+ (2012+).
#
# --ignore-gpu-blocklist
#   Desabilita a GPU blocklist do Chromium, que previne aceleração de hardware
#   em combinações específicas de GPU/driver/kernel conhecidas por causar
#   problemas. No Jett OS, o hardware é homogêneo e testado — a blocklist
#   pode ser ignorada para maximizar a aceleração disponível.
#
#   NOTA DE SEGURANÇA: esta flag NÃO compromete a segurança do browser;
#   ela apenas habilita recursos de GPU que o Chromium bloquearia por
#   precaução de compatibilidade. Em hardware não testado, pode causar
#   artifacts visuais ou crashes do processo de renderização (não do browser).
#   O Restart=always no systemd recupera automaticamente de crashes.
#
# --enable-features=VaapiVideoDecoder,VaapiVideoEncoder
#   VA-API para decodificação/codificação de vídeo por hardware.
#   Detalhes: ver brave.conf.
#
# --enable-features=AcceleratedVideoDecodeLinuxGL
#   Complementar ao VaapiVideoDecoder: habilita decodificação acelerada
#   via OpenGL para codecs não cobertos diretamente pelo VA-API (como
#   alguns perfis de AV1 em hardware mais antigo).

JETT_THORIUM_FLAGS_GPU=(
    "--enable-gpu-rasterization"
    "--enable-zero-copy"
    "--ignore-gpu-blocklist"
    "--enable-features=VaapiVideoDecoder,VaapiVideoEncoder,AcceleratedVideoDecodeLinuxGL"
)

# -----------------------------------------------------------------------------
# DESABILITAR WORKAROUNDS DE DRIVER DESNECESSÁRIOS
# -----------------------------------------------------------------------------

# --disable-gpu-driver-bug-workarounds
#   O Chromium mantém uma lista de workarounds para bugs conhecidos em
#   drivers gráficos (ex: forçar software rendering para certas operações
#   em drivers Intel antigos). No Jett OS com hardware e drivers controlados,
#   esses workarounds introduzem overhead sem benefício. Esta flag os desabilita,
#   permitindo que a GPU use seu caminho de renderização nativo e mais eficiente.
#
#   Como --ignore-gpu-blocklist, deve ser usado apenas em hardware validado.

JETT_THORIUM_FLAGS_DRIVER=(
    "--disable-gpu-driver-bug-workarounds"
)

# -----------------------------------------------------------------------------
# ESTABILIDADE DO KIOSK
# -----------------------------------------------------------------------------

JETT_THORIUM_FLAGS_KIOSK_STABILITY=(
    "--disable-session-crashed-bubble"
    "--autoplay-policy=no-user-gesture-required"
    "--disable-infobars"
    "--no-default-browser-check"
)

# -----------------------------------------------------------------------------
# INTEGRAÇÃO COM O SISTEMA
# -----------------------------------------------------------------------------

JETT_THORIUM_FLAGS_SYSTEM=(
    "--password-store=basic"
    "--disable-background-mode"
    "--disable-sync"
)

# -----------------------------------------------------------------------------
# VARIÁVEL CONSOLIDADA
# -----------------------------------------------------------------------------

JETT_THORIUM_FLAGS=(
    "${JETT_THORIUM_FLAGS_KIOSK[@]}"
    "${JETT_THORIUM_FLAGS_WAYLAND[@]}"
    "${JETT_THORIUM_FLAGS_GPU[@]}"
    "${JETT_THORIUM_FLAGS_DRIVER[@]}"
    "${JETT_THORIUM_FLAGS_KIOSK_STABILITY[@]}"
    "${JETT_THORIUM_FLAGS_SYSTEM[@]}"
)

JETT_THORIUM_FLAGS_STR="${JETT_THORIUM_FLAGS[*]}"
