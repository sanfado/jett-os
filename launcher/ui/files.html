<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jett OS — Arquivos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 800px;
    height: 500px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'DejaVu Sans', 'Noto Sans', sans-serif;
    font-size: 13px;
    user-select: none;
    -webkit-user-select: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 24px 28px 20px;
    gap: 16px;
  }

  /* ── Cabeçalho ── */
  .cabecalho {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .titulo {
    font-size: 11px;
    letter-spacing: 3px;
    color: #333;
    text-transform: uppercase;
  }
  #btn-fechar {
    background: none;
    border: none;
    color: #333;
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  #btn-fechar:hover { color: #888; }

  /* ── Dispositivos USB ── */
  .secao-titulo {
    font-size: 10px;
    letter-spacing: 2px;
    color: #222;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #0d0d0d;
  }

  #lista-usb {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    flex-shrink: 0;
    max-height: 180px;
  }

  .item-usb {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #0a0a0a;
    border: 1px solid #111;
    border-radius: 2px;
  }

  .usb-icone { font-size: 18px; flex-shrink: 0; }

  .usb-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
    min-width: 0;
  }
  .usb-nome {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .usb-detalhe {
    font-size: 10px;
    color: #333;
  }

  .usb-acoes { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-usb {
    padding: 5px 14px;
    font-size: 11px;
    font-family: inherit;
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 2px;
    color: #555;
    cursor: pointer;
  }
  .btn-usb:hover { background: #161616; color: #888; }
  .btn-usb.montado { color: #3a3; border-color: #1a2a1a; background: #0a0f0a; }
  .btn-usb.montado:hover { background: #0f150f; color: #4a4; }

  /* ── Aviso sem dispositivos ── */
  .vazio {
    color: #222;
    font-size: 11px;
    padding: 20px 0;
    text-align: center;
  }

  /* ── Área de conteúdo ── */
  #area-conteudo {
    flex: 1;
    background: #050505;
    border: 1px solid #0d0d0d;
    border-radius: 2px;
    overflow-y: auto;
    padding: 12px;
  }

  #caminho-atual {
    font-size: 10px;
    color: #222;
    padding: 6px 0 10px;
    letter-spacing: 1px;
    word-break: break-all;
  }

  .item-arquivo {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 2px;
    cursor: default;
    color: #666;
    font-size: 12px;
  }
  .item-arquivo:hover { background: #0d0d0d; color: #aaa; }
  .item-arquivo .arq-icone { font-size: 14px; flex-shrink: 0; }
  .item-arquivo .arq-nome  { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-arquivo .arq-tam   { font-size: 10px; color: #333; flex-shrink: 0; }

  /* ── Rodapé ── */
  #rodape {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #status-bar {
    font-size: 10px;
    color: #222;
    letter-spacing: 1px;
  }
  #btn-atualizar {
    padding: 6px 16px;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 2px;
    color: #444;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
  }
  #btn-atualizar:hover { background: #111; color: #777; }
</style>
</head>
<body>

<div id="app">

  <!-- Cabeçalho -->
  <div class="cabecalho">
    <div class="titulo">Arquivos</div>
    <button id="btn-fechar" onclick="fechar()">✕</button>
  </div>

  <!-- Dispositivos USB -->
  <div>
    <div class="secao-titulo">Dispositivos USB</div>
    <div id="lista-usb">
      <div class="vazio">Verificando dispositivos...</div>
    </div>
  </div>

  <!-- Conteúdo do dispositivo montado -->
  <div id="area-conteudo">
    <div id="caminho-atual">Selecione um dispositivo para visualizar o conteúdo</div>
    <div id="lista-arquivos"></div>
  </div>

  <!-- Rodapé -->
  <div id="rodape">
    <span id="status-bar">—</span>
    <button id="btn-atualizar" onclick="carregarDispositivos()">Atualizar</button>
  </div>

</div>

<script>
let dispositivoAtivo = null;

// ── Dispositivos USB ──────────────────────────────────────────────────────────
async function carregarDispositivos() {
  const lista = document.getElementById('lista-usb');
  lista.innerHTML = '<div class="vazio">Verificando...</div>';

  try {
    const res = await fetch('/api/usb/list');
    const dados = await res.json();
    const devs = dados.dispositivos || [];

    if (!devs.length) {
      lista.innerHTML = '<div class="vazio">Nenhum dispositivo USB detectado</div>';
      atualizarStatus('Nenhum dispositivo USB');
      return;
    }

    lista.innerHTML = devs.map(dev => {
      const montado = !!dev.montagem;
      return `
        <div class="item-usb">
          <div class="usb-icone">💾</div>
          <div class="usb-info">
            <div class="usb-nome">${dev.dispositivo}</div>
            <div class="usb-detalhe">${dev.tamanho}${montado ? ` — montado em ${dev.montagem}` : ''}</div>
          </div>
          <div class="usb-acoes">
            ${montado
              ? `<button class="btn-usb montado" onclick="verConteudo('${dev.dispositivo}','${dev.montagem}')">Abrir</button>
                 <button class="btn-usb" onclick="desmontar('${dev.dispositivo}','${dev.montagem}')">Ejetar</button>`
              : `<button class="btn-usb" onclick="montar('${dev.dispositivo}')">Montar</button>`
            }
          </div>
        </div>
      `;
    }).join('');

    atualizarStatus(`${devs.length} dispositivo(s) encontrado(s)`);
  } catch(e) {
    lista.innerHTML = '<div class="vazio">Erro ao carregar dispositivos</div>';
  }
}

async function montar(dispositivo) {
  atualizarStatus(`Montando ${dispositivo}...`);
  try {
    const res = await fetch('/api/usb/mount', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device: dispositivo }),
    });
    const dados = await res.json();
    if (dados.ok) {
      await carregarDispositivos();
      if (dados.montagem) verConteudo(dispositivo, dados.montagem);
    } else {
      atualizarStatus(`Erro: ${dados.erro || 'falha ao montar'}`);
    }
  } catch(e) {
    atualizarStatus('Erro ao montar dispositivo');
  }
}

async function desmontar(dispositivo, ponto) {
  atualizarStatus(`Ejetando ${dispositivo}...`);
  try {
    const res = await fetch('/api/usb/unmount', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ point: dispositivo }),
    });
    const dados = await res.json();
    if (dados.ok) {
      if (dispositivoAtivo === dispositivo) limparConteudo();
      await carregarDispositivos();
      atualizarStatus('Dispositivo ejetado com segurança');
    } else {
      atualizarStatus(`Erro: ${dados.erro || 'falha ao ejetar'}`);
    }
  } catch(e) {
    atualizarStatus('Erro ao ejetar dispositivo');
  }
}

// ── Conteúdo do dispositivo ───────────────────────────────────────────────────
async function verConteudo(dispositivo, caminho) {
  dispositivoAtivo = dispositivo;
  document.getElementById('caminho-atual').textContent = caminho;
  document.getElementById('lista-arquivos').innerHTML =
    '<div style="color:#222;font-size:11px;padding:8px 0">Lendo...</div>';

  // Nota: listagem de arquivos via fetch API local não é suportada diretamente.
  // Mostra o caminho de montagem para o usuário acessar via terminal se necessário.
  document.getElementById('lista-arquivos').innerHTML = `
    <div class="item-arquivo">
      <span class="arq-icone">📂</span>
      <span class="arq-nome">${caminho}</span>
    </div>
    <div style="margin-top:12px;color:#1a1a1a;font-size:10px;letter-spacing:1px">
      DISPOSITIVO MONTADO — ACESSE PELO TERMINAL OU PELO NAVEGADOR
    </div>
  `;
  atualizarStatus(`Montado em: ${caminho}`);
}

function limparConteudo() {
  dispositivoAtivo = null;
  document.getElementById('caminho-atual').textContent =
    'Selecione um dispositivo para visualizar o conteúdo';
  document.getElementById('lista-arquivos').innerHTML = '';
}

// ── Utilitários ───────────────────────────────────────────────────────────────
function atualizarStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

function fechar() {
  try { window.close(); } catch(e) {}
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') fechar();
});

// ── Inicialização ─────────────────────────────────────────────────────────────
carregarDispositivos();
</script>
</body>
</html>
